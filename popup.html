<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">⚡</span>
      <h1>Settings</h1>
      <div class="header-actions">
        <button id="btn-about" class="header-btn" title="About Ask your GIT">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm6.5-.25A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/></svg>
        </button>
      </div>
    </div>

    <!-- About Modal -->
    <div id="about-modal" class="about-modal" style="display:none">
      <div class="about-content">
        <div class="about-icon-wrap">
          <span class="about-logo">⚡</span>
        </div>
        <h2>Ask your GIT</h2>
        <p class="about-version" id="about-version">Version 3.0.0</p>
        <p class="about-subtitle">Ask AI about any repo, then install with one click</p>
        <div class="about-links-list">
          <a href="https://github.com/pirajoke/smile" target="_blank">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            GitHub
          </a>
          <a href="https://github.com/pirajoke/smile/issues" target="_blank">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"/></svg>
            Report Bug
          </a>
        </div>
        <div class="about-footer">
          <p class="about-copyright">&copy; 2025 Maxim Grachev. MIT License.</p>
        </div>
        <button id="about-close" class="about-close-btn">Close</button>
      </div>
    </div>

    <!-- Settings (scrollable content below) -->
    <div id="settings-section">

    <div class="section launch-section">
      <button id="btn-launch" class="launch-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <span class="launch-label">Launch Ask your GIT</span>
    </div>

    <div class="divider"></div>

    <!-- Hidden elements for JS compatibility -->
    <select id="default-client" style="display:none"></select>
    <input type="checkbox" id="one-click" style="display:none">
    <span id="bridge-status" style="display:none"></span>
    <span id="bridge-hint" style="display:none"></span>

    <div class="section">
      <label class="label" for="terminal-app">Terminal App</label>
      <select id="terminal-app" class="select">
        <option value="auto">Auto-detect</option>
        <option value="Terminal">Terminal.app</option>
        <option value="iTerm2">iTerm2</option>
        <option value="Warp">Warp</option>
      </select>
    </div>

    <div class="divider"></div>

    <div id="custom-tools-list" style="display:none"></div>
    <div id="tool-modal" class="tool-modal" style="display:none"></div>

    <!-- Claude API Key -->
    <div class="section">
      <label class="label" for="claude-api-key">Claude API Key</label>
      <input type="password" id="claude-api-key" class="input" placeholder="sk-ant-...">
      <p class="hint">For AI-powered repo summaries (Haiku model)</p>
    </div>

    <!-- Hidden elements to prevent JS errors -->
    <div id="stat-summaries" style="display:none"></div>
    <div id="stat-chats" style="display:none"></div>
    <div id="stat-installs" style="display:none"></div>
    <div id="stat-repos" style="display:none"></div>
    <div id="emoji-pack" style="display:none"></div>
    <div id="share-template" style="display:none"></div>
    <div id="stats-total" style="display:none"></div>
    <div id="stats-tiers" style="display:none"></div>
    <div id="share-history" style="display:none"></div>
    </div><!-- /settings-section -->
  </div>
  <script src="popup.js"></script>
</body>
</html>
